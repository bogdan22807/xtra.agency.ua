<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="640" y1="0" x2="640" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090909"/><stop offset="1" stop-color="#0E0E0E"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="25%" r="50%">
      <stop stop-color="#FFD400" stop-opacity="0.18"/><stop offset="1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="40%">
