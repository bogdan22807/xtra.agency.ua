    </filter>
    <filter id="yellowGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#FFD400" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
